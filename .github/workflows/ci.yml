name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        leg: [fmt, lint, unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: gofmt
        if: matrix.leg == 'fmt'
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "Not gofmt-formatted:"
            echo "$fmt_out"
            exit 1
          fi

      - name: golangci-lint
        if: matrix.leg == 'lint'
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: go vet
        if: matrix.leg == 'unit'
        run: go vet ./...

      - name: go build
        if: matrix.leg == 'unit'
        run: go build ./...

      - name: go test
        if: matrix.leg == 'unit'
        run: go test ./...

  docker-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker build
        run: docker build -t portico:ci .
