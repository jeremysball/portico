name: Release

on:
  # Publish only once CI has PASSED on main. Triggering on `push: branches: [main]` would
  # publish an image whose gofmt/vet/build never ran.
  workflow_run:
    workflows: [CI]
    types: [completed]
  # Version tags publish directly: CI does not run on tag pushes, so there is no workflow_run
  # to wait on, and the tag itself is the deliberate release gesture.
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  # Every merge to main republishes :latest, the tag Watchtower on the host follows, plus
  # :sha-<short>, which is what you pin to roll back without a rebuild.
  #
  # The previous config tagged main pushes `:main` (type=ref,event=branch) and only ever
  # produced `:latest` on a semver tag, because metadata-action's latest=auto fires on semver
  # only. docker-compose.yml pulls :latest, so merges published an image nothing consumed.
  publish-main:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Semver releases keep their version tags. Watchtower follows :latest only, so pinning the
  # host to one of these is exactly how a rollback sticks instead of being pulled forward.
  publish-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
