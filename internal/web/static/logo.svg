<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Portico">
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#8ce6c2" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#2f7d68" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#08110f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1512"/>
      <stop offset="100%" stop-color="#050908"/>
    </linearGradient>
    <linearGradient id="fog1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f4a44" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3c8677" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1f4a44" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fog2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#173832" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2b6459" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#173832" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13221f"/>
      <stop offset="100%" stop-color="#060b0a"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" rx="28" fill="url(#bg)"/>
  <circle cx="100" cy="76" r="70" fill="url(#glow)"/>

  <!-- faint moon -->
  <circle cx="100" cy="52" r="14" fill="#bff2da" opacity="0.55"/>
  <circle cx="105" cy="49" r="14" fill="#050908" opacity="0.85"/>

  <!-- portico: pediment + columns -->
  <g fill="url(#stone)" stroke="#0d1a17" stroke-width="1">
    <polygon points="55,96 100,68 145,96" />
    <rect x="58" y="94" width="84" height="8"/>
    <rect x="64" y="102" width="10" height="62"/>
    <rect x="86" y="102" width="10" height="62"/>
    <rect x="104" y="102" width="10" height="62"/>
    <rect x="126" y="102" width="10" height="62"/>
    <rect x="56" y="164" width="88" height="9"/>
  </g>

  <!-- drifting fog bands over the columns -->
  <rect x="0" y="88" width="200" height="22" fill="url(#fog1)"/>
  <rect x="0" y="120" width="200" height="26" fill="url(#fog2)"/>
  <rect x="0" y="150" width="200" height="20" fill="url(#fog1)"/>

  <!-- suggestion of tide / tentacle curls at the base, kept subtle -->
  <g stroke="#173832" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M40,180 q10,-8 20,0 q10,8 20,0"/>
    <path d="M118,182 q10,-9 20,0 q10,9 20,0"/>
  </g>
</svg>
