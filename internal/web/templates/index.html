<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}}</title>
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)">
<meta name="description" content="Auto-discovering dashboard for self-hosted services.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icon-32.png" sizes="32x32">
<link rel="icon" href="/static/icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="/static/icon-180.png">
</head>
<body>
  <header>
    <div class="brand">
      <svg class="logo-mark" viewBox="0 0 200 200" role="img" aria-label="{{.Title}}">
        <rect x="3" y="3" width="194" height="194" rx="4" class="logo-bg" stroke-width="8"/>
        <rect x="28" y="38" width="144" height="20" class="logo-ink"/>
        <rect x="42" y="66" width="18" height="86" class="logo-ink"/>
        <rect x="78" y="66" width="18" height="86" class="logo-ink"/>
        <rect x="114" y="66" width="18" height="86" class="logo-accent" stroke-width="4"/>
        <rect x="150" y="66" width="14" height="86" class="logo-ink"/>
        <rect x="28" y="156" width="144" height="20" class="logo-ink"/>
      </svg>
      <span class="wordmark">portico</span>
    </div>
    <div id="status" class="status">connecting&hellip;</div>
  </header>
  <main id="app">
    <p class="empty">Loading services&hellip;</p>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
